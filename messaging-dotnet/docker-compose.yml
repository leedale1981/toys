version: '3.8'

# Full local development stack.
# Run:  docker compose up -d
# Stop: docker compose down
#
# Services:
#   Kafka broker:    localhost:9092
#   Kafka UI:        http://localhost:8080
#   PostgreSQL:      localhost:5432
#   Seq (UI+logs):   http://localhost:5341
#   API:             http://localhost:8081
#   Ingestion svc:   (background worker)
#   File svc:        (background worker)

services:

  # ── Infrastructure ──────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ld-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock_records
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/LD.Messaging.Infrastructure.Persistence/setup-database.sql:/docker-entrypoint-initdb.d/01-setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock_records"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: ld-seq
    ports:
      - "5341:80"      # Seq UI + Serilog HTTP sink + OTLP HTTP ingestion
      - "45341:45341"  # OTLP gRPC ingestion (optional)
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seq_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: ld-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: ld-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic FTSE500 --partitions 1 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic NYSE    --partitions 1 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic NASDAQ  --partitions 1 --replication-factor 1 &&
       echo 'Topics created: FTSE500, NYSE, NASDAQ'"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ld-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ── Application Services ─────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: api/LD.Messaging.Api/Dockerfile
    container_name: ld-api
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__StockRecordsDb: "Host=postgres;Port=5432;Database=stock_records;Username=postgres;Password=postgres"
      Seq__ServerUrl: "http://seq:80"
      Seq__OtlpEndpoint: "http://seq:80"
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started

  ingestion:
    build:
      context: .
      dockerfile: ingestion-service/LD.Messaging.Ingestion/Dockerfile
    container_name: ld-ingestion
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__StockRecordsDb: "Host=postgres;Port=5432;Database=stock_records;Username=postgres;Password=postgres"
      Seq__ServerUrl: "http://seq:80"
      Seq__OtlpEndpoint: "http://seq:80"
      Kafka__BootstrapServers: "kafka:29092"
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      kafka:
        condition: service_healthy

  file-service:
    build:
      context: .
      dockerfile: file-service/LD.Messaging.FileService/Dockerfile
    container_name: ld-file-service
    environment:
      DOTNET_ENVIRONMENT: Production
      Seq__ServerUrl: "http://seq:80"
      Seq__OtlpEndpoint: "http://seq:80"
      Kafka__BootstrapServers: "kafka:29092"
    depends_on:
      seq:
        condition: service_started
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  seq_data:
